# Render Blueprint — relay.crosstalk.sh
#
# Provisioning:
#   1. Render dashboard → New → Blueprint → connect cordfuse/crosstalk-runtime
#   2. Set RELAY_SECRET and WEBHOOK_SECRET in the dashboard (sync: false here so
#      values stay out of git)
#   3. Add Namecheap CNAME: relay.crosstalk.sh → <render-service>.onrender.com
#   4. Render auto-issues a Let's Encrypt cert once DNS resolves
#
# Free tier sleeps after 15 min of inactivity — unsuitable for a relay that
# runtimes hold persistent WebSocket connections to. Starter ($7/mo) keeps
# the service warm.

services:
  - type: web
    name: crosstalk-relay
    runtime: docker
    repo: https://github.com/cordfuse/crosstalk-runtime
    branch: main
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: RELAY_MODE
        value: server
      - key: RELAY_SECRET
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
    domains:
      - relay.crosstalk.sh
