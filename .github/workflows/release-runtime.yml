name: Release — Runtime

on:
  push:
    tags:
      - 'v*'

# Distribution model (v0.6.0-alpha.4+): pure node npm package, no per-platform
# binaries. Users install via the GitHub release tarball:
#
#   npm install -g https://github.com/cordfuse/crosstalk-runtime/releases/download/vX.Y.Z/crosstalk-runtime-X.Y.Z.tgz
#
# OR (once @cordfuse npm scope is fixed):
#
#   npm install -g @cordfuse/crosstalk-runtime
#
# **NOT supported: git-URL install** (e.g. `npm install -g cordfuse/crosstalk-runtime#tag`).
# npm runs the package's `prepare` lifecycle on git-URL installs BEFORE
# installing devDependencies in the temp clone — so `tsc` isn't on PATH
# when prepare fires. The .tgz install path works because CI runs
# `npm install` (with devDeps) BEFORE `npm pack`, baking dist/ into the
# tarball. End users just consume pre-built dist/ from the .tgz.
#
# @homebridge's install script fetches/builds the right native PTY for the
# user's host platform automatically (no cross-compile, no .node bundling).

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (runs prepare → tsc)
        run: npm install

      - name: Smoke-test compiled binary
        run: node dist/index.js version

      - name: Pack tarball
        run: npm pack

      - name: List artifacts
        run: ls -la *.tgz

      - name: Compute version-without-v for tarball URL
        id: vinfo
        run: echo "vnum=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Runtime ${{ github.ref_name }}
          body: |
            Crosstalk runtime ${{ github.ref_name }}.

            **Install:**

            ```sh
            npm install -g https://github.com/cordfuse/crosstalk-runtime/releases/download/${{ github.ref_name }}/crosstalk-runtime-${{ steps.vinfo.outputs.vnum }}.tgz
            ```

            The tarball ships pre-built `dist/` so `npm install` doesn't have to compile TypeScript on your machine. `@homebridge/node-pty-prebuilt-multiarch` does build its native PTY module locally — requires Node `>=18` and (for source-build fallback) Xcode CLI tools on Mac or `python3 make g++` on Linux. Most dev users have these.

            **Why not `npm install -g cordfuse/crosstalk-runtime#${{ github.ref_name }}` (git URL form)?** npm runs the package's `prepare` lifecycle on git-URL installs BEFORE installing devDependencies in the temp clone — so `tsc` isn't on PATH when prepare fires and the build fails. Stick to the tarball URL above; it Just Works.

            Once the npm `@cordfuse` scope's email correction lands, install will simplify to:

            ```sh
            npm install -g @cordfuse/crosstalk-runtime
            ```

            See [WHATSNEW.md](https://github.com/cordfuse/crosstalk/blob/main/WHATSNEW.md) for changes — runtime changelog lives in the operator-facing repo.
          files: |
            crosstalk-runtime-*.tgz
