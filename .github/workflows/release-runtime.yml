name: Release — Runtime

on:
  push:
    tags:
      - 'v*'

# Distribution model (v0.6.0-alpha.4+): pure node npm package, no per-platform
# binaries. Primary install path (v0.8.1+):
#
#   npm install -g @cordfuse/crosstalk-runtime
#
# Fallback / pinned-version install via the GitHub release tarball:
#
#   npm install -g https://github.com/cordfuse/crosstalk-runtime/releases/download/vX.Y.Z/cordfuse-crosstalk-runtime-X.Y.Z.tgz
#
# **NOT supported: git-URL install** (e.g. `npm install -g cordfuse/crosstalk-runtime#tag`).
# npm runs the package's `prepare` lifecycle on git-URL installs BEFORE
# installing devDependencies in the temp clone — so `tsc` isn't on PATH
# when prepare fires. The .tgz install path works because CI runs
# `npm install` (with devDeps) BEFORE `npm pack`, baking dist/ into the
# tarball. End users just consume pre-built dist/ from the .tgz.
#
# @homebridge's install script fetches/builds the right native PTY for the
# user's host platform automatically (no cross-compile, no .node bundling).

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (runs prepare → tsc)
        run: npm install

      - name: Smoke-test compiled output
        run: node --input-type=module -e "await import('./dist/config.js')"

      - name: Pack tarball
        run: npm pack

      - name: List artifacts
        run: ls -la *.tgz

      - name: Compute version-without-v for tarball URL
        id: vinfo
        run: echo "vnum=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Runtime ${{ github.ref_name }}
          body: |
            Crosstalk runtime ${{ github.ref_name }} — v2 lean runtime.

            **Install:**

            ```sh
            npm install -g @cordfuse/crosstalk-runtime
            ```

            **Run:**

            ```sh
            crosstalk --config config.yaml
            ```

            Copy `config.example.yaml` → `config.yaml`, fill in your transport path, channel GUID, and agent CLI, then start. See [SPEC-runtime-v2.md](https://github.com/cordfuse/crosstalk-runtime/blob/main/SPEC-runtime-v2.md) for the full design.

            **Pinned-version fallback:**

            ```sh
            npm install -g https://github.com/cordfuse/crosstalk-runtime/releases/download/${{ github.ref_name }}/cordfuse-crosstalk-runtime-${{ steps.vinfo.outputs.vnum }}.tgz
            ```

            **Why not git URL install?** npm runs `prepare` before devDependencies are installed — `tsc` isn't on PATH when it fires. Use npm or the tarball above.

            See [WHATSNEW.md](https://github.com/cordfuse/crosstalk/blob/main/WHATSNEW.md) for changes — runtime changelog lives in the operator-facing repo.
          files: |
            cordfuse-crosstalk-runtime-*.tgz

      - name: Determine npm dist-tag
        id: npmtag
        # Pre-releases (anything with `-` after the patch number, e.g. 0.9.0-alpha.1)
        # publish under the `next` tag so default `npm install -g <pkg>` keeps
        # resolving to the most recent stable. Stable releases publish under `latest`.
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish --access public --tag ${{ steps.npmtag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
