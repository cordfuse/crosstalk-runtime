name: Release — Runtime

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary (linux-x64)
        run: bun build --compile --minify src/index.ts --outfile crosstalk-linux-x64 --target bun-linux-x64

      - name: Build binary (linux-arm64)
        run: bun build --compile --minify src/index.ts --outfile crosstalk-linux-arm64 --target bun-linux-arm64

      - name: Build binary (darwin-x64)
        run: bun build --compile --minify src/index.ts --outfile crosstalk-darwin-x64 --target bun-darwin-x64

      - name: Build binary (darwin-arm64)
        run: bun build --compile --minify src/index.ts --outfile crosstalk-darwin-arm64 --target bun-darwin-arm64

      - name: Checksums
        run: sha256sum crosstalk-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Runtime ${{ steps.version.outputs.version }}
          body: |
            Crosstalk runtime ${{ steps.version.outputs.version }}.

            See [WHATSNEW.md](https://github.com/cordfuse/crosstalk/blob/main/WHATSNEW.md) for changes — runtime changelog lives in the operator-facing repo.
          files: |
            crosstalk-linux-x64
            crosstalk-linux-arm64
            crosstalk-darwin-x64
            crosstalk-darwin-arm64
            SHA256SUMS
