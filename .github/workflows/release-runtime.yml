name: Release — Runtime

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vinfo.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version
        id: vinfo
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install

      - name: Build all platform binaries
        run: |
          bun build --compile --target=bun-linux-x64    ./src/runner.ts --outfile crosstalk-linux-x64
          bun build --compile --target=bun-linux-arm64  ./src/runner.ts --outfile crosstalk-linux-arm64
          bun build --compile --target=bun-darwin-x64   ./src/runner.ts --outfile crosstalk-darwin-x64
          bun build --compile --target=bun-darwin-arm64 ./src/runner.ts --outfile crosstalk-darwin-arm64

      - name: Smoke test (linux-x64)
        run: ./crosstalk-linux-x64 --version

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            crosstalk-linux-x64
            crosstalk-linux-arm64
            crosstalk-darwin-x64
            crosstalk-darwin-arm64

  package-linux:
    name: Package Linux
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Install packaging tools
        run: sudo apt-get install -y dpkg-dev rpm

      - name: Make binaries executable
        run: chmod +x crosstalk-linux-*

      - name: Build .deb (amd64)
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh ./crosstalk-linux-x64 ${{ needs.build-binaries.outputs.version }} amd64

      - name: Build .deb (arm64)
        run: ./packaging/build-deb.sh ./crosstalk-linux-arm64 ${{ needs.build-binaries.outputs.version }} arm64

      - name: Build .rpm (x86_64)
        run: |
          chmod +x packaging/build-rpm.sh
          ./packaging/build-rpm.sh ./crosstalk-linux-x64 ${{ needs.build-binaries.outputs.version }} x86_64

      - name: Build .rpm (aarch64)
        run: ./packaging/build-rpm.sh ./crosstalk-linux-arm64 ${{ needs.build-binaries.outputs.version }} aarch64

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            *.deb
            *.rpm

  release:
    name: Create GitHub Release
    needs: [build-binaries, package-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries

      - uses: actions/download-artifact@v4
        with:
          name: linux-packages

      - name: Make binaries executable
        run: chmod +x crosstalk-linux-* crosstalk-darwin-*

      - name: Compute SHA256s
        id: sha
        run: |
          echo "linux_x64=$(sha256sum crosstalk-linux-x64 | cut -d' ' -f1)"       >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256sum crosstalk-linux-arm64 | cut -d' ' -f1)"   >> $GITHUB_OUTPUT
          echo "darwin_x64=$(sha256sum crosstalk-darwin-x64 | cut -d' ' -f1)"     >> $GITHUB_OUTPUT
          echo "darwin_arm64=$(sha256sum crosstalk-darwin-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Determine npm dist-tag
        id: npmtag
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Runtime ${{ github.ref_name }}
          body: |
            ## Crosstalk Runtime ${{ github.ref_name }}

            ### Install

            **Arch / CachyOS:**
            ```sh
            yay -S crosstalk-runtime
            ```

            **Debian / Ubuntu:**
            ```sh
            curl -LO https://github.com/cordfuse/crosstalk-runtime/releases/download/${{ github.ref_name }}/crosstalk-runtime_${{ needs.build-binaries.outputs.version }}_amd64.deb
            sudo apt install ./crosstalk-runtime_${{ needs.build-binaries.outputs.version }}_amd64.deb
            ```

            **Fedora / RHEL:**
            ```sh
            sudo dnf install https://github.com/cordfuse/crosstalk-runtime/releases/download/${{ github.ref_name }}/crosstalk-runtime-${{ needs.build-binaries.outputs.version }}-1.x86_64.rpm
            ```

            **macOS (Homebrew):**
            ```sh
            brew install cordfuse/tap/crosstalk-runtime
            sudo brew services start cordfuse/tap/crosstalk-runtime
            ```

            **After installing, add a transport:**
            ```sh
            sudo crosstalk add-transport <git-url>
            sudo systemctl start crosstalk   # Linux
            ```

            ### SHA256
            | Binary | SHA256 |
            |--------|--------|
            | `crosstalk-linux-x64`    | `${{ steps.sha.outputs.linux_x64 }}` |
            | `crosstalk-linux-arm64`  | `${{ steps.sha.outputs.linux_arm64 }}` |
            | `crosstalk-darwin-x64`   | `${{ steps.sha.outputs.darwin_x64 }}` |
            | `crosstalk-darwin-arm64` | `${{ steps.sha.outputs.darwin_arm64 }}` |
          files: |
            crosstalk-linux-x64
            crosstalk-linux-arm64
            crosstalk-darwin-x64
            crosstalk-darwin-arm64
            *.deb
            *.rpm
            packaging/PKGBUILD
            packaging/crosstalk-runtime.install

      - name: Update Homebrew formula SHA256s
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/cordfuse/homebrew-cordfuse.git tap
          sed -i "s/PLACEHOLDER_LINUX_X64/${{ steps.sha.outputs.linux_x64 }}/"       tap/Formula/crosstalk-runtime.rb
          sed -i "s/PLACEHOLDER_LINUX_ARM64/${{ steps.sha.outputs.linux_arm64 }}/"   tap/Formula/crosstalk-runtime.rb
          sed -i "s/PLACEHOLDER_DARWIN_X64/${{ steps.sha.outputs.darwin_x64 }}/"     tap/Formula/crosstalk-runtime.rb
          sed -i "s/PLACEHOLDER_DARWIN_ARM64/${{ steps.sha.outputs.darwin_arm64 }}/" tap/Formula/crosstalk-runtime.rb
          sed -i "s/version \".*\"/version \"${{ needs.build-binaries.outputs.version }}\"/" tap/Formula/crosstalk-runtime.rb
          cd tap
          git config user.email "ci@cordfuse.ai"
          git config user.name "Cordfuse CI"
          git add Formula/crosstalk-runtime.rb
          git diff --staged --quiet || git commit -m "chore: update crosstalk-runtime to ${{ github.ref_name }}"
          git push

      - name: Publish to npm (fallback install path)
        if: ${{ env.NPM_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: npm install + publish
        if: ${{ env.NPM_TOKEN != '' }}
        run: |
          npm install
          npm publish --access public --tag ${{ steps.npmtag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
