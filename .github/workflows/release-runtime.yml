name: Release — Runtime

on:
  push:
    tags:
      - 'v*'

# Per-platform CI runners. node-pty's native binary needs to be the right one
# for each target architecture. Cross-compile from a Linux runner to
# bun-darwin-arm64 has been tried and fails: bun's --compile bundles whatever
# .node files exist in node_modules, which on a Linux host means only the
# linux prebuilds. The result is a Mach-O binary missing pty.node, which
# crashes on launch with "Cannot require module ../build/Release/pty.node".
#
# Solution: each binary builds on its own native runner, so the prebuild
# fetched by trustedDependencies' install script (postinstall via
# prebuild-install) is the right one for the target.

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build linux-x64 binary
        run: bun build --compile --minify src/index.ts --outfile crosstalk-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: crosstalk-linux-x64
          path: crosstalk-linux-x64

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build linux-arm64 binary
        run: bun build --compile --minify src/index.ts --outfile crosstalk-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: crosstalk-linux-arm64
          path: crosstalk-linux-arm64

  build-macos-arm64:
    runs-on: macos-latest    # macos-latest is arm64 (M-series) since 2024-10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build macos-arm64 binary
        run: bun build --compile --minify src/index.ts --outfile crosstalk-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: crosstalk-macos-arm64
          path: crosstalk-macos-arm64

  # macos-x64 build dropped from this release: macos-13 (the last GH-hosted
  # x64 macOS runner) is being deprecated and the runner pool is heavily
  # backed up — the v0.6.0-alpha.3 attempt sat queued for 30+ minutes. No
  # current crosstalk users are on x64 Macs (Steve's Mac is M-series arm64).
  # Re-add when (a) macos-13 pool frees up, OR (b) we figure out
  # macos-arm64-runner-with-Rosetta cross-compile to x64. Backlog item.

  release:
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify expected binaries present
        run: |
          ls -la artifacts/
          for f in crosstalk-linux-x64 crosstalk-linux-arm64 crosstalk-macos-arm64; do
            test -f "artifacts/$f" || { echo "MISSING: $f"; exit 1; }
          done

      - name: Checksums
        working-directory: artifacts
        run: sha256sum crosstalk-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Runtime ${{ steps.version.outputs.version }}
          body: |
            Crosstalk runtime ${{ steps.version.outputs.version }}.

            See [WHATSNEW.md](https://github.com/cordfuse/crosstalk/blob/main/WHATSNEW.md) for changes — runtime changelog lives in the operator-facing repo.
          files: |
            artifacts/crosstalk-linux-x64
            artifacts/crosstalk-linux-arm64
            artifacts/crosstalk-macos-arm64
            artifacts/SHA256SUMS
