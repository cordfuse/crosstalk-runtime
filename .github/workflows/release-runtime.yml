name: Release — Runtime

on:
  push:
    tags:
      - 'v*'

# Distribution model (v0.6.0-alpha.4+): pure node npm package, no per-platform
# binaries. Users install via:
#
#   npm install -g cordfuse/crosstalk-runtime#vX.Y.Z          (git URL — current)
#   npm install -g @cordfuse/crosstalk-runtime                (npm registry — once
#                                                              the @cordfuse scope's
#                                                              email correction lands)
#
# The npm install runs the package's `prepare` script which compiles TS → dist/.
# @homebridge's install script fetches/builds the right native PTY for the
# user's host platform automatically (no cross-compile, no .node bundling).
#
# This workflow now just produces a GitHub Release entry with a packed tarball
# attached as a convenience asset. The actual install path is the git URL form
# above — it works against the tag directly without any registry involvement.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (runs prepare → tsc)
        run: npm install

      - name: Smoke-test compiled binary
        run: node dist/index.js version

      - name: Pack tarball
        run: npm pack

      - name: List artifacts
        run: ls -la *.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Runtime ${{ github.ref_name }}
          body: |
            Crosstalk runtime ${{ github.ref_name }}.

            **Install (git URL — current):**

            ```sh
            npm install -g cordfuse/crosstalk-runtime#${{ github.ref_name }}
            ```

            Works for npm, pnpm, yarn, and `bunx`. The `prepare` script compiles TypeScript → `dist/`, and `@homebridge/node-pty-prebuilt-multiarch` builds its native PTY module for your platform automatically. Requires Node `>=18` and (for source-build fallback) Xcode CLI tools on Mac or `python3 make g++` on Linux.

            See [WHATSNEW.md](https://github.com/cordfuse/crosstalk/blob/main/WHATSNEW.md) for changes — runtime changelog lives in the operator-facing repo.
          files: |
            crosstalk-runtime-*.tgz
