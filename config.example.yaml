# Crosstalk runtime v2 — example config
# Copy this file to config.yaml (git-ignored) and fill in transport + agents.
# Everything except transport and agents[].name / agents[].cli is optional.

transport: ../my-crosstalk-transport   # path to your transport repo

# tokn: push serialization via named-channel turn coordinator.
# API key is read from TOKN_API_KEY env var — do not put it here.
# Remove this block to fall back to jitter-based push retry.
tokn:
  url: http://tokn.linux.internal:3000   # or your Render URL in prod
  channel: crosstalk:push

agents:
  - name: concierge
    cli: claude --print

  - name: engineer
    cli: claude --print
