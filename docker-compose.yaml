services:
  crosstalk-relay:
    build: .
    container_name: crosstalk-relay
    restart: unless-stopped
    environment:
      PORT: 3003
      # First-run smoke test uses "open mode" (no secrets). Fill these in once auth is wired:
      RELAY_SECRET: ""
      WEBHOOK_SECRET: ""
    ports:
      # Host-published for direct ws://localhost:3003 access during development.
      # Caddy reaches the container over proxy_net regardless of this mapping.
      - "3003:3003"
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
