services:
  crosstalk-relay:
    build: .
    container_name: crosstalk-relay
    restart: unless-stopped
    environment:
      PORT: 3003
      # Empty defaults = open mode. Override at runtime to enable auth:
      #   RELAY_SECRET=... WEBHOOK_SECRET=... docker compose up -d --force-recreate
      RELAY_SECRET: ${RELAY_SECRET:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    ports:
      # Host-published for direct ws://localhost:3003 access during development.
      # Caddy reaches the container over proxy_net regardless of this mapping.
      - "3003:3003"
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
